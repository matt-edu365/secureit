name: Azure OIDC Diagnostic

on:
  workflow_dispatch:

jobs:
  tenant_login_diagnostic:
    name: Tenant-only login diagnostic
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show masked input presence and shape
        shell: bash
        run: |
          set -euo pipefail

          check_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "- $name: MISSING" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "::add-mask::$value"
              echo "- $name: present, length ${#value}" >> "$GITHUB_STEP_SUMMARY"
            fi
          }

          {
            echo "# Azure OIDC diagnostic"
            echo "## Secret presence"
          } >> "$GITHUB_STEP_SUMMARY"

          check_secret "AZURE_CLIENT_ID" "${{ secrets.AZURE_CLIENT_ID }}"
          check_secret "AZURE_TENANT_ID" "${{ secrets.AZURE_TENANT_ID }}"
          check_secret "AZURE_SUBSCRIPTION_ID" "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Validate GUID formatting
        shell: bash
        run: |
          set -euo pipefail
          guid_regex='^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'

          validate_guid() {
            local name="$1"
            local value="$2"
            if [[ "$value" =~ $guid_regex ]]; then
              echo "- $name: valid GUID shape" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- $name: INVALID GUID SHAPE" >> "$GITHUB_STEP_SUMMARY"
              echo "$name is not in GUID format" >&2
              exit 1
            fi
          }

          {
            echo ""
            echo "## GUID format validation"
          } >> "$GITHUB_STEP_SUMMARY"

          validate_guid "AZURE_CLIENT_ID" "${{ secrets.AZURE_CLIENT_ID }}"
          validate_guid "AZURE_TENANT_ID" "${{ secrets.AZURE_TENANT_ID }}"
          validate_guid "AZURE_SUBSCRIPTION_ID" "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Attempt tenant-only Azure login via OIDC
        id: tenant_login
        uses: azure/login@v2
        continue-on-error: true
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Summarise tenant-only login result
        if: always()
        shell: bash
        run: |
          {
            echo ""
            echo "## Tenant-only Azure login result"
            echo "- Outcome: ${{ steps.tenant_login.outcome }}"
            echo "- Conclusion: ${{ steps.tenant_login.conclusion }}"
          } >> "$GITHUB_STEP_SUMMARY"

  subscription_login_diagnostic:
    name: Subscription-scoped login diagnostic
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    needs: tenant_login_diagnostic
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Attempt subscription-scoped Azure login via OIDC
        id: subscription_login
        uses: azure/login@v2
        continue-on-error: true
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Summarise subscription-scoped login result
        if: always()
        shell: bash
        run: |
          {
            echo "# Subscription-scoped Azure login result"
            echo "- Outcome: ${{ steps.subscription_login.outcome }}"
            echo "- Conclusion: ${{ steps.subscription_login.conclusion }}"
            echo ""
            echo "If tenant-only login succeeds but subscription-scoped login fails, the remaining problem is subscription visibility, tenant mismatch, or incorrect subscription linkage for this principal."
          } >> "$GITHUB_STEP_SUMMARY"
