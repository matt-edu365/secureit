name: SecureIT Manual Run

on:
  workflow_dispatch:
    inputs:
      tenant_key:
        description: Tenant key from config/tenants.json
        required: true
        default: ncvo
      tenant_name:
        description: Tenant display name
        required: true
        default: NCVO
      tenant_domain:
        description: NCVO primary tenant domain for Exchange Online connection
        required: true
      tenant_id:
        description: NCVO Microsoft 365 tenant ID
        required: true
      client_id:
        description: NCVO Microsoft 365 application ID
        required: true
      client_secret_name:
        description: Azure Key Vault secret name for the tenant app secret (must already exist)
        required: false
        default: AZURE-CLIENT-SECRET-NCVO
      auth_mode:
        description: Authentication mode for this run
        required: true
        default: client-secret
        type: choice
        options:
          - certificate
          - client-secret
      report_base_url:
        description: Base URL for published reports
        required: false
        default: https://secureit.ict365.ky/ncvo
      email_to:
        description: NCVO report recipient email
        required: false
        default: ""
      test_profile:
        description: Test profile to run (Maester-83 is the legacy 83-check run; SecureIT-Production-101 includes the 365Inspect bundle)
        required: true
        default: SecureIT-Production-101
        type: choice
        options:
          - Maester-83
          - 365Inspect-18
          - Certificate-Auth-Test
          - SecureIT-Production-101

jobs:
  run-assessment:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    env:
      CONFIG_PATH: config/tenants.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login via OIDC (tenant scope)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Create runtime tenant config
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path (Split-Path -Parent $env:CONFIG_PATH) | Out-Null
          $tenant = [ordered]@{
            tenants = @(
              [ordered]@{
                id = "${{ github.event.inputs.tenant_key }}"
                name = "${{ github.event.inputs.tenant_name }}"
                tenantId = "${{ github.event.inputs.tenant_id }}"
                tenantDomain = "${{ github.event.inputs.tenant_domain }}"
                clientId = "${{ github.event.inputs.client_id }}"
                authMode = "${{ github.event.inputs.auth_mode }}"
                clientSecretName = "${{ github.event.inputs.client_secret_name }}"
                certificateBase64 = "${{ secrets.AZURE_CLIENT_CERTIFICATE_B64_NCVO }}"
                certificatePassword = "${{ secrets.AZURE_CLIENT_CERTIFICATE_PASSWORD_NCVO }}"
                reportBaseUrl = "${{ github.event.inputs.report_base_url }}"
                emailTo = "${{ github.event.inputs.email_to }}"
              }
            )
          }
          $tenant | ConvertTo-Json -Depth 10 | Set-Content -Path $env:CONFIG_PATH -Encoding UTF8

      - name: Resolve tenant configuration
        shell: pwsh
        run: |
          $tenant = ./scripts/Get-TenantConfig.ps1 -TenantKey "${{ github.event.inputs.tenant_key }}" -ConfigPath "$env:CONFIG_PATH" | ConvertFrom-Json
          "TENANT_KEY=$($tenant.id)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TENANT_NAME=$($tenant.name)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "AZURE_TENANT_ID_TARGET=$($tenant.tenantId)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "AZURE_TENANT_DOMAIN_TARGET=$($tenant.tenantDomain)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "AZURE_CLIENT_ID_TARGET=$($tenant.clientId)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "MAESTER_AUTH_MODE=$($tenant.authMode)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CLIENT_SECRET_NAME=$($tenant.clientSecretName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "REPORT_BASE_URL=$($tenant.reportBaseUrl)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CERTIFICATE_BASE64=$($tenant.certificateBase64)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CERTIFICATE_PASSWORD=$($tenant.certificatePassword)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Fetch client secret from Azure Key Vault
        if: ${{ env.MAESTER_AUTH_MODE == 'client-secret' }}
        shell: bash
        run: |
          set -euo pipefail
          SECRET_VALUE=$(az keyvault secret show --vault-name secureit --name "$CLIENT_SECRET_NAME" --query value -o tsv)
          if [ -z "$SECRET_VALUE" ]; then
            echo "Secret '$CLIENT_SECRET_NAME' was not retrieved from Key Vault." >&2
            exit 1
          fi
          echo "CLIENT_SECRET=$SECRET_VALUE" >> "$GITHUB_ENV"

      - name: Validate certificate inputs
        if: ${{ env.MAESTER_AUTH_MODE == 'certificate' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CERTIFICATE_BASE64:-}" ]; then
            echo "CERTIFICATE_BASE64 is empty for certificate auth mode." >&2
            exit 1
          fi

      - name: Setup isolated PowerShell module path
        shell: pwsh
        run: |
          $moduleRoot = Join-Path $HOME 'secureit-psmodules'
          New-Item -ItemType Directory -Force -Path $moduleRoot | Out-Null
          "PSMODULEPATH_ROOT=$moduleRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install PowerShell modules
        shell: pwsh
        env:
          PSModulePath: ${{ env.PSMODULEPATH_ROOT }}
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck -AllowClobber
          if (-not (Get-Module -ListAvailable -Name Microsoft.Graph.Authentication)) {
            Install-Module Microsoft.Graph.Authentication -Scope CurrentUser -Force -AllowClobber
          }
          if (-not (Get-Module -ListAvailable -Name ExchangeOnlineManagement)) {
            Install-Module ExchangeOnlineManagement -Scope CurrentUser -Force -AllowClobber
          }
          if (-not (Get-Module -ListAvailable -Name Maester)) {
            if (Get-PSResourceRepository -ErrorAction SilentlyContinue) {
              Install-PSResource Maester -TrustRepository -Scope CurrentUser
            }
            else {
              Install-Module Maester -Scope CurrentUser -Force -AllowClobber
            }
          }
          Import-Module Pester -RequiredVersion 5.7.1 -Force
          Import-Module ExchangeOnlineManagement -Force
          Import-Module Maester -Force
          $env:CI = 'true'
          $maesterModule = Get-Module -ListAvailable -Name Maester | Sort-Object Version -Descending | Select-Object -First 1
          $moduleRoot = Split-Path -Parent $maesterModule.Path
          $testsRoot = Join-Path $moduleRoot 'maester-tests'
          if (-not (Test-Path -LiteralPath $testsRoot)) {
            'y' | Install-MaesterTests
          }

      - name: Run SecureIT assessment engine
        id: maester
        continue-on-error: true
        shell: pwsh
        env:
          PSModulePath: ${{ env.PSMODULEPATH_ROOT }}
        run: |
          ./scripts/Invoke-MaesterRun.ps1 -TenantKey "$env:TENANT_KEY" -TenantName "$env:TENANT_NAME" -TenantId "$env:AZURE_TENANT_ID_TARGET" -TenantDomain "$env:AZURE_TENANT_DOMAIN_TARGET" -ClientId "$env:AZURE_CLIENT_ID_TARGET" -AuthMode "$env:MAESTER_AUTH_MODE" -ClientSecret "$env:CLIENT_SECRET" -CertificateBase64 "$env:CERTIFICATE_BASE64" -CertificatePassword "$env:CERTIFICATE_PASSWORD" -WebsiteBaseUrl "$env:REPORT_BASE_URL" -ConfigPath "$env:CONFIG_PATH" -TestProfile "${{ github.event.inputs.test_profile }}"


      - name: Prepare app import bundle
        if: always()
        shell: bash
        env:
          TENANT_KEY: ${{ env.TENANT_KEY }}
        run: |
          set -euo pipefail
          if [ ! -d "output/${TENANT_KEY}" ]; then
            echo "No tenant output directory found for ${TENANT_KEY}, skipping app import bundle preparation."
            exit 0
          fi
          mkdir -p "app-import/${TENANT_KEY}"
          rsync -a --delete "output/${TENANT_KEY}/" "app-import/${TENANT_KEY}/"

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secureit-report-${{ github.event.inputs.tenant_key }}-${{ github.run_number }}
          path: |
            output/${{ github.event.inputs.tenant_key }}/
            app-import/${{ github.event.inputs.tenant_key }}/

      - name: Workflow summary deployment note
        if: always()
        shell: bash
        run: |
          {
            echo ""
            echo "## Deployment path"
            echo "- Intended flow: build locally -> push to GitHub -> GitHub build/push image -> deploy to Docker host -> test -> refine"
            echo "- Target public hostname: https://secureit.ict365.ky"
            echo "- This workflow prepares assessment output and app-import artifacts only."
            echo "- Deployment should be handled by the Docker delivery workflow and target host automation."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Workflow summary
        if: always()
        shell: pwsh
        run: |
          if ($env:MAESTER_SUMMARY_PATH -and (Test-Path $env:MAESTER_SUMMARY_PATH)) {
            $summary = Get-Content -Raw -Path $env:MAESTER_SUMMARY_PATH | ConvertFrom-Json
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "# SecureIT assessment run: $($summary.tenantName)"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Tenant key: $($summary.tenantKey)"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Total: $($summary.total)"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Passed: $($summary.passed)"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Failed: $($summary.failed)"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Skipped: $($summary.skipped)"
            if ($summary.reportUrl) {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Report: $($summary.reportUrl)"
            }
          }
          else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "# SecureIT assessment run: ${{ github.event.inputs.tenant_key }}"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- No summary file was generated.'
          }

      - name: Fail workflow if the assessment step truly failed without fallback outputs
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.maester.outcome }}" != "success" ] && [ ! -f "output/${{ github.event.inputs.tenant_key }}/latest/summary.json" ]; then
            echo "Assessment step failed and no fallback summary was produced." >&2
            exit 1
          fi
