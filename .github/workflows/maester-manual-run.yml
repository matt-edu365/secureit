name: Maester Manual Run

on:
  workflow_dispatch:
    inputs:
      tenant_key:
        description: Tenant key from config/tenants.json
        required: true
        default: ict365
      tenant_name:
        description: Tenant display name
        required: true
        default: ICT365 Cayman
      tenant_id:
        description: Microsoft 365 tenant ID
        required: true
        default: 7c7c9c8d-8e91-4fbb-af84-16af4739c726
      client_id:
        description: Microsoft 365 application ID
        required: true
        default: 68cddeaf-29f7-4d60-b04c-12ce7663079e
      client_secret_name:
        description: Azure Key Vault secret name for the tenant app secret
        required: true
        default: AZURE-CLIENT-SECRET-ICT365
      report_base_url:
        description: Base URL for published reports
        required: false
        default: https://example.ict365.uk/ict365
      email_to:
        description: Report recipient email
        required: false
        default: matt.fletcher@ict365.ky
      test_profile:
        description: Test profile to run
        required: true
        default: light
        type: choice
        options:
          - light
          - full

jobs:
  run-maester:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      CONFIG_PATH: config/tenants.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login via OIDC (tenant scope)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Create runtime tenant config
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path (Split-Path -Parent $env:CONFIG_PATH) | Out-Null
          $tenant = [ordered]@{
            tenants = @(
              [ordered]@{
                id = "${{ github.event.inputs.tenant_key }}"
                name = "${{ github.event.inputs.tenant_name }}"
                tenantId = "${{ github.event.inputs.tenant_id }}"
                clientId = "${{ github.event.inputs.client_id }}"
                authMode = 'client-secret'
                clientSecretName = "${{ github.event.inputs.client_secret_name }}"
                reportBaseUrl = "${{ github.event.inputs.report_base_url }}"
                emailTo = "${{ github.event.inputs.email_to }}"
              }
            )
          }
          $tenant | ConvertTo-Json -Depth 10 | Set-Content -Path $env:CONFIG_PATH -Encoding UTF8
          Get-Content -Raw -Path $env:CONFIG_PATH

      - name: Ensure tenant config exists
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath $env:CONFIG_PATH)) {
            throw "Missing tenant config file: $env:CONFIG_PATH"
          }

      - name: Resolve tenant configuration
        shell: pwsh
        run: |
          $tenant = ./scripts/Get-TenantConfig.ps1 -TenantKey "${{ github.event.inputs.tenant_key }}" -ConfigPath "$env:CONFIG_PATH" | ConvertFrom-Json
          if (-not $tenant.tenantId) { throw 'tenantId missing from tenant config.' }
          if (-not $tenant.clientId) { throw 'clientId missing from tenant config.' }
          if (-not $tenant.name) { throw 'name missing from tenant config.' }
          if (-not $tenant.authMode) { throw 'authMode missing from tenant config.' }
          if ($tenant.authMode -eq 'client-secret' -and -not $tenant.clientSecretName) {
            throw 'clientSecretName missing from tenant config for client-secret auth.'
          }

          "TENANT_KEY=$($tenant.id)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TENANT_NAME=$($tenant.name)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "AZURE_TENANT_ID_TARGET=$($tenant.tenantId)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "AZURE_CLIENT_ID_TARGET=$($tenant.clientId)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "MAESTER_AUTH_MODE=$($tenant.authMode)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CLIENT_SECRET_NAME=$($tenant.clientSecretName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "REPORT_BASE_URL=$($tenant.reportBaseUrl)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Fetch client secret from Azure Key Vault
        if: ${{ env.MAESTER_AUTH_MODE == 'client-secret' }}
        shell: bash
        run: |
          set -euo pipefail
          SECRET_VALUE=$(az keyvault secret show --vault-name secureit --name "$CLIENT_SECRET_NAME" --query value -o tsv)
          if [ -z "$SECRET_VALUE" ]; then
            echo "Secret '$CLIENT_SECRET_NAME' was not retrieved from Key Vault." >&2
            exit 1
          fi
          echo "CLIENT_SECRET=$SECRET_VALUE" >> "$GITHUB_ENV"

      - name: Setup PowerShell modules cache directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$HOME/Documents/PowerShell/Modules" | Out-Null
          $legacyPester = Join-Path $HOME '.local/share/powershell/Modules/Pester/4.0.3'
          if (Test-Path -LiteralPath $legacyPester) {
            Remove-Item -LiteralPath $legacyPester -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          if (Get-Module -ListAvailable -Name Pester) {
            Get-InstalledModule Pester -ErrorAction SilentlyContinue | Uninstall-Module -AllVersions -Force -ErrorAction SilentlyContinue
          }
          Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck -AllowClobber
          if (-not (Get-Module -ListAvailable -Name Microsoft.Graph.Authentication)) {
            Install-Module Microsoft.Graph.Authentication -Scope CurrentUser -Force -AllowClobber
          }
          if (-not (Get-Module -ListAvailable -Name Maester)) {
            if (Get-PSResourceRepository -ErrorAction SilentlyContinue) {
              Install-PSResource Maester -TrustRepository -Scope CurrentUser
            }
            else {
              Install-Module Maester -Scope CurrentUser -Force -AllowClobber
            }
          }
          Import-Module Pester -RequiredVersion 5.7.1 -Force
          Import-Module Maester -Force
          Install-MaesterTests

      - name: Run Maester assessment
        shell: pwsh
        run: |
          ./scripts/Invoke-MaesterRun.ps1 -TenantKey "$env:TENANT_KEY" -TenantName "$env:TENANT_NAME" -TenantId "$env:AZURE_TENANT_ID_TARGET" -ClientId "$env:AZURE_CLIENT_ID_TARGET" -AuthMode "$env:MAESTER_AUTH_MODE" -ClientSecret "$env:CLIENT_SECRET" -WebsiteBaseUrl "$env:REPORT_BASE_URL" -ConfigPath "$env:CONFIG_PATH" -TestProfile "${{ github.event.inputs.test_profile }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maester-report-${{ github.event.inputs.tenant_key }}-${{ github.run_number }}
          path: output/${{ github.event.inputs.tenant_key }}/

      - name: Workflow summary
        if: always()
        shell: pwsh
        run: |
          if ($env:MAESTER_SUMMARY_PATH -and (Test-Path $env:MAESTER_SUMMARY_PATH)) {
            $summary = Get-Content -Raw -Path $env:MAESTER_SUMMARY_PATH | ConvertFrom-Json
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "# Maester run: $($summary.tenantName)"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Tenant key: $($summary.tenantKey)"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Total: $($summary.total)"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Passed: $($summary.passed)"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Failed: $($summary.failed)"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Skipped: $($summary.skipped)"
            if ($summary.reportUrl) {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Report: $($summary.reportUrl)"
            }
          }
          else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "# Maester run: ${{ github.event.inputs.tenant_key }}"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- No summary file was generated.'
          }
