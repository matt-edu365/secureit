name: SecureIT Production

on:
  workflow_dispatch:
    inputs:
      tenant_key:
        description: Optional tenant key to run
        required: false
        default: ""
      tenant_name:
        description: Optional tenant display name for direct dispatch
        required: false
        default: ""
      tenant_domain:
        description: Optional tenant domain for direct dispatch
        required: false
        default: ""
      tenant_id:
        description: Optional Microsoft 365 tenant ID for direct dispatch
        required: false
        default: ""
      client_id:
        description: Optional Microsoft 365 application ID for direct dispatch
        required: false
        default: ""
      auth_mode:
        description: Optional authentication mode for direct dispatch
        required: false
        default: ""
      client_secret_name:
        description: Optional Azure Key Vault client secret name for direct dispatch
        required: false
        default: ""
      certificate_secret_name:
        description: Optional Azure Key Vault certificate secret name for direct dispatch
        required: false
        default: ""
      certificate_password_secret_name:
        description: Optional Azure Key Vault certificate password secret name for direct dispatch
        required: false
        default: ""
      report_base_url:
        description: Optional report base URL for direct dispatch
        required: false
        default: ""
      email_to:
        description: Optional report recipient email for direct dispatch
        required: false
        default: ""
      m365_tenant_name:
        description: Optional Microsoft 365 tenant display name for direct dispatch
        required: false
        default: ""
      test_profile:
        description: Test profile to run
        required: true
        default: client-secret-full
        type: choice
        options:
          - client-secret-baseline
          - client-secret-full
          - graph-baseline
          - light
          - exchange-online
          - secureit-365inspect
          - secureit-full
          - full
  schedule:
    - cron: '0 3 * * 1'

jobs:
  discover-tenants:
    runs-on: ubuntu-latest
    outputs:
      tenant_matrix: ${{ steps.collect.outputs.tenant_matrix }}
      tenant_count: ${{ steps.collect.outputs.tenant_count }}
    steps:
      - name: Collect tenant payload from SecureIT
        id: collect
        shell: pwsh
        env:
          SECUREIT_BASE_URL: ${{ vars.SECUREIT_BASE_URL_DEV || vars.SECUREIT_BASE_URL_LIVE || 'https://secureit.ict365.ky' }}
          SECUREIT_WORKFLOW_SYNC_TOKEN: ${{ secrets.SECUREIT_WORKFLOW_SYNC_TOKEN }}
          INPUT_TENANT_KEY: ${{ github.event.inputs.tenant_key }}
          INPUT_TENANT_NAME: ${{ github.event.inputs.tenant_name }}
          INPUT_TENANT_DOMAIN: ${{ github.event.inputs.tenant_domain }}
          INPUT_TENANT_ID: ${{ github.event.inputs.tenant_id }}
          INPUT_CLIENT_ID: ${{ github.event.inputs.client_id }}
          INPUT_AUTH_MODE: ${{ github.event.inputs.auth_mode }}
          INPUT_CLIENT_SECRET_NAME: ${{ github.event.inputs.client_secret_name }}
          INPUT_CERTIFICATE_SECRET_NAME: ${{ github.event.inputs.certificate_secret_name }}
          INPUT_CERTIFICATE_PASSWORD_SECRET_NAME: ${{ github.event.inputs.certificate_password_secret_name }}
          INPUT_REPORT_BASE_URL: ${{ github.event.inputs.report_base_url }}
          INPUT_EMAIL_TO: ${{ github.event.inputs.email_to }}
          INPUT_M365_TENANT_NAME: ${{ github.event.inputs.m365_tenant_name }}
        run: |
          $baseUrl = $env:SECUREIT_BASE_URL.TrimEnd('/')
          if ([string]::IsNullOrWhiteSpace($baseUrl) -or $baseUrl -notmatch '^https?://') {
            throw "SECUREIT_BASE_URL is not configured correctly: '$baseUrl'"
          }
          if ([string]::IsNullOrWhiteSpace($env:SECUREIT_WORKFLOW_SYNC_TOKEN)) {
            throw 'SECUREIT_WORKFLOW_SYNC_TOKEN is not configured in GitHub.'
          }
          $syncFingerprint = [Convert]::ToHexString([Security.Cryptography.SHA256]::HashData([Text.Encoding]::UTF8.GetBytes($env:SECUREIT_WORKFLOW_SYNC_TOKEN))).Substring(0, 12)
          "Workflow sync fingerprint: $syncFingerprint" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

          $tenantKey = [string]::IsNullOrWhiteSpace($env:INPUT_TENANT_KEY) ? '' : $env:INPUT_TENANT_KEY
          $tenantName = [string]::IsNullOrWhiteSpace($env:INPUT_TENANT_NAME) ? '' : $env:INPUT_TENANT_NAME
          $tenantDomain = [string]::IsNullOrWhiteSpace($env:INPUT_TENANT_DOMAIN) ? '' : $env:INPUT_TENANT_DOMAIN
          $tenantId = [string]::IsNullOrWhiteSpace($env:INPUT_TENANT_ID) ? '' : $env:INPUT_TENANT_ID
          $clientId = [string]::IsNullOrWhiteSpace($env:INPUT_CLIENT_ID) ? '' : $env:INPUT_CLIENT_ID
          $authMode = [string]::IsNullOrWhiteSpace($env:INPUT_AUTH_MODE) ? '' : $env:INPUT_AUTH_MODE
          $clientSecretName = [string]::IsNullOrWhiteSpace($env:INPUT_CLIENT_SECRET_NAME) ? '' : $env:INPUT_CLIENT_SECRET_NAME
          $certificateSecretName = [string]::IsNullOrWhiteSpace($env:INPUT_CERTIFICATE_SECRET_NAME) ? '' : $env:INPUT_CERTIFICATE_SECRET_NAME
          $certificatePasswordSecretName = [string]::IsNullOrWhiteSpace($env:INPUT_CERTIFICATE_PASSWORD_SECRET_NAME) ? '' : $env:INPUT_CERTIFICATE_PASSWORD_SECRET_NAME
          $reportBaseUrl = [string]::IsNullOrWhiteSpace($env:INPUT_REPORT_BASE_URL) ? '' : $env:INPUT_REPORT_BASE_URL
          $emailTo = [string]::IsNullOrWhiteSpace($env:INPUT_EMAIL_TO) ? '' : $env:INPUT_EMAIL_TO
          $m365TenantName = [string]::IsNullOrWhiteSpace($env:INPUT_M365_TENANT_NAME) ? '' : $env:INPUT_M365_TENANT_NAME
          $reportBaseUrlSource = 'workflow_dispatch input'

          if ([string]::IsNullOrWhiteSpace($reportBaseUrl) -and $tenantKey -ne '' -and $baseUrl -match '^https?://') {
            $reportBaseUrl = $baseUrl.TrimEnd('/') + '/' + [uri]::EscapeDataString($tenantKey)
            $reportBaseUrlSource = 'derived from SECUREIT_BASE_URL'
          }

          $useDirectTenantInputs = $tenantKey -ne '' -and $tenantName -ne '' -and $tenantId -ne '' -and $clientId -ne '' -and $authMode -ne '' -and $reportBaseUrl -ne ''
          switch ($authMode) {
            'client-secret' {
              if ([string]::IsNullOrWhiteSpace($clientSecretName)) {
                $useDirectTenantInputs = $false
              }
            }
            'certificate' {
              if ([string]::IsNullOrWhiteSpace($certificateSecretName) -or [string]::IsNullOrWhiteSpace($certificatePasswordSecretName)) {
                $useDirectTenantInputs = $false
              }
            }
            '' {
              $useDirectTenantInputs = $false
            }
            default {
              if ($useDirectTenantInputs) {
                $useDirectTenantInputs = $true
              }
            }
          }

          if ($useDirectTenantInputs) {
            $tenants = @(
              [ordered]@{
                tenantKey = $tenantKey
                tenantName = $tenantName
                tenantId = $tenantId
                clientId = $clientId
                authMode = $authMode
                clientSecretName = $clientSecretName
                certificateSecretName = $certificateSecretName
                certificatePasswordSecretName = $certificatePasswordSecretName
                tenantDomain = $tenantDomain
                m365TenantName = $m365TenantName
                reportBaseUrl = $reportBaseUrl
                emailTo = $emailTo
                ready = $true
                missing = @()
              }
            )
            $responseBody = [ordered]@{
              ok = $true
              generatedAt = [DateTimeOffset]::UtcNow.ToString('o')
              fingerprint = $syncFingerprint
              count = 1
              readyCount = 1
              tenants = $tenants
              source = 'workflow_dispatch'
            }
          }
          else {
            $query = @()
            if ($tenantKey -ne '') {
              $query += 'tenant_key=' + [uri]::EscapeDataString($tenantKey)
            }
            else {
              $query += 'ready=1'
            }

            $uri = $baseUrl + '/workflow-sync.php?' + ($query -join '&')
            $response = Invoke-WebRequest -Uri $uri -Method Get -Headers @{
              Authorization = "Bearer $($env:SECUREIT_WORKFLOW_SYNC_TOKEN)"
              'X-SecureIT-Workflow-Token' = $env:SECUREIT_WORKFLOW_SYNC_TOKEN
              Accept = 'application/json'
            } -SkipHttpErrorCheck -TimeoutSec 30 -ErrorAction Stop

            $statusCode = [int] $response.StatusCode
            $responseText = [string] $response.Content
            if ($statusCode -ne 200) {
              $details = $responseText
              try {
                $errorPayload = $responseText | ConvertFrom-Json -ErrorAction Stop
                if ($errorPayload.message) {
                  $details = [string] $errorPayload.message
                }
              }
              catch {
              }

              switch ($statusCode) {
                401 { throw "SecureIT rejected the workflow sync token. Check that the GitHub secret matches the live container value. Details: $details" }
                403 { throw "SecureIT denied the workflow sync request. Check the token and live host permissions. Details: $details" }
                404 { throw "SecureIT workflow sync endpoint was not found. Check that the deployed container includes app/workflow-sync.php. Details: $details" }
                default { throw "SecureIT workflow sync endpoint returned HTTP $statusCode. Details: $details" }
              }
            }

            try {
              $responseBody = $responseText | ConvertFrom-Json -ErrorAction Stop
            }
            catch {
              throw "SecureIT workflow sync endpoint returned invalid JSON: $($_.Exception.Message)"
            }

            if (-not $responseBody.ok) {
              $syncMessage = [string] ($responseBody.message ?? 'Unknown error')
              throw "SecureIT workflow sync endpoint reported failure: $syncMessage"
            }

            $tenants = @($responseBody.tenants)
            if (-not $tenants) {
              throw 'SecureIT did not return any tenants for this run.'
            }
          }

          $matrixObject = [ordered]@{
            include = @($tenants)
          }
          $matrixJson = $matrixObject | ConvertTo-Json -Depth 20 -Compress
          $summaryLines = @(
            "SecureIT Production discovery",
            "",
            "Base URL: $baseUrl",
            "Requested tenant key: " + ($(if ($tenantKey -ne '') { $tenantKey } else { '[all ready tenants]' })),
            "Discovered tenants: $($tenants.Count)",
            "Tenant source: " + ($(if ($useDirectTenantInputs) { 'workflow_dispatch inputs' } else { 'SecureIT workflow-sync' })),
            "Report base URL source: $reportBaseUrlSource"
          )
          foreach ($tenant in $tenants) {
            $summaryLines += "- $($tenant.tenantKey) | $($tenant.tenantName) | auth=$($tenant.authMode) | ready=$($tenant.ready)"
          }
          if ($responseBody.fingerprint) {
            $summaryLines += ""
            $summaryLines += "SecureIT fingerprint: $($responseBody.fingerprint)"
          }
          $summaryLines | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

          "tenant_matrix=$matrixJson" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tenant_count=$($tenants.Count)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $summaryText = $summaryLines -join [Environment]::NewLine
          "tenant_summary<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $summaryText | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

  run-assessment:
    needs: discover-tenants
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-tenants.outputs.tenant_matrix) }}
    env:
      CONFIG_PATH: config/tenants.json
      TEST_PROFILE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_profile || 'secureit-full' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login via OIDC (tenant scope)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Create runtime tenant config
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path (Split-Path -Parent $env:CONFIG_PATH) | Out-Null
          $authMode = "${{ matrix.authMode }}"
          $tenant = [ordered]@{
            tenants = @(
              [ordered]@{
                id = "${{ matrix.tenantKey }}"
                name = "${{ matrix.tenantName }}"
                tenantId = "${{ matrix.tenantId }}"
                tenantDomain = "${{ matrix.tenantDomain }}"
                clientId = "${{ matrix.clientId }}"
                authMode = $authMode
                clientSecretName = "${{ matrix.clientSecretName }}"
                certificateSecretName = "${{ matrix.certificateSecretName }}"
                certificatePasswordSecretName = "${{ matrix.certificatePasswordSecretName }}"
                reportBaseUrl = "${{ matrix.reportBaseUrl }}"
                emailTo = "${{ matrix.emailTo }}"
              }
            )
          }
          $tenant | ConvertTo-Json -Depth 10 | Set-Content -Path $env:CONFIG_PATH -Encoding UTF8

      - name: Resolve tenant configuration
        shell: pwsh
        run: |
          $tenant = ./scripts/Get-TenantConfig.ps1 -TenantKey "${{ matrix.tenantKey }}" -ConfigPath "$env:CONFIG_PATH" | ConvertFrom-Json
          "TENANT_KEY=$($tenant.id)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TENANT_NAME=$($tenant.name)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "AZURE_TENANT_ID_TARGET=$($tenant.tenantId)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "AZURE_TENANT_DOMAIN_TARGET=$($tenant.tenantDomain)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "AZURE_CLIENT_ID_TARGET=$($tenant.clientId)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "MAESTER_AUTH_MODE=$($tenant.authMode)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CLIENT_SECRET_NAME=$($tenant.clientSecretName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CERTIFICATE_SECRET_NAME=$($tenant.certificateSecretName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CERTIFICATE_PASSWORD_SECRET_NAME=$($tenant.certificatePasswordSecretName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "REPORT_BASE_URL=$($tenant.reportBaseUrl)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Validate tenant payload
        shell: pwsh
        run: |
          $missing = @()
          foreach ($field in @(
            'TENANT_KEY',
            'TENANT_NAME',
            'AZURE_TENANT_ID_TARGET',
            'AZURE_CLIENT_ID_TARGET',
            'MAESTER_AUTH_MODE',
            'REPORT_BASE_URL'
          )) {
            $value = [System.Environment]::GetEnvironmentVariable($field)
            if ([string]::IsNullOrWhiteSpace($value)) {
              $missing += $field
            }
          }

          switch ($env:MAESTER_AUTH_MODE) {
            'client-secret' {
              if ([string]::IsNullOrWhiteSpace($env:CLIENT_SECRET_NAME)) {
                $missing += 'CLIENT_SECRET_NAME'
              }
            }
            'certificate' {
              if ([string]::IsNullOrWhiteSpace($env:CERTIFICATE_SECRET_NAME)) {
                $missing += 'CERTIFICATE_SECRET_NAME'
              }
              if ([string]::IsNullOrWhiteSpace($env:CERTIFICATE_PASSWORD_SECRET_NAME)) {
                $missing += 'CERTIFICATE_PASSWORD_SECRET_NAME'
              }
            }
            default {
              $missing += 'unsupported auth mode: ' + $env:MAESTER_AUTH_MODE
            }
          }

          if ($missing.Count -gt 0) {
            throw ('SecureIT returned incomplete tenant data: ' + ($missing -join ', '))
          }

          "## Tenant ready for run`n- Tenant key: $($env:TENANT_KEY)`n- Auth mode: $($env:MAESTER_AUTH_MODE)`n- Report base URL: $($env:REPORT_BASE_URL)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Fetch tenant auth material from Azure Key Vault
        shell: pwsh
        run: |
          switch ($env:MAESTER_AUTH_MODE) {
            'client-secret' {
              $secretValue = az keyvault secret show --vault-name secureit --name $env:CLIENT_SECRET_NAME --query value -o tsv
              if ([string]::IsNullOrWhiteSpace($secretValue)) {
                throw "Secret '$($env:CLIENT_SECRET_NAME)' was not retrieved from Key Vault."
              }
              "CLIENT_SECRET=$secretValue" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            }
            'certificate' {
              $certificateBase64 = az keyvault secret show --vault-name secureit --name $env:CERTIFICATE_SECRET_NAME --query value -o tsv
              if ([string]::IsNullOrWhiteSpace($certificateBase64)) {
                throw "Secret '$($env:CERTIFICATE_SECRET_NAME)' was not retrieved from Key Vault."
              }

              $certificatePassword = az keyvault secret show --vault-name secureit --name $env:CERTIFICATE_PASSWORD_SECRET_NAME --query value -o tsv
              if ([string]::IsNullOrWhiteSpace($certificatePassword)) {
                throw "Secret '$($env:CERTIFICATE_PASSWORD_SECRET_NAME)' was not retrieved from Key Vault."
              }

              "CERTIFICATE_BASE64=$certificateBase64" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
              "CERTIFICATE_PASSWORD=$certificatePassword" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            }
            default {
              throw "Unsupported authentication mode: $($env:MAESTER_AUTH_MODE)"
            }
          }

      - name: Setup isolated PowerShell module path
        shell: pwsh
        run: |
          $moduleRoot = Join-Path $HOME 'secureit-psmodules'
          New-Item -ItemType Directory -Force -Path $moduleRoot | Out-Null
          "PSMODULEPATH_ROOT=$moduleRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install PowerShell modules
        shell: pwsh
        env:
          PSModulePath: ${{ env.PSMODULEPATH_ROOT }}
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck -AllowClobber
          if (-not (Get-Module -ListAvailable -Name Microsoft.Graph.Authentication)) {
            Install-Module Microsoft.Graph.Authentication -Scope CurrentUser -Force -AllowClobber
          }
          if (-not (Get-Module -ListAvailable -Name ExchangeOnlineManagement)) {
            Install-Module ExchangeOnlineManagement -Scope CurrentUser -Force -AllowClobber
          }
          if (-not (Get-Module -ListAvailable -Name Maester)) {
            if (Get-PSResourceRepository -ErrorAction SilentlyContinue) {
              Install-PSResource Maester -TrustRepository -Scope CurrentUser
            }
            else {
              Install-Module Maester -Scope CurrentUser -Force -AllowClobber
            }
          }
          Import-Module Pester -RequiredVersion 5.7.1 -Force
          Import-Module ExchangeOnlineManagement -Force
          Import-Module Maester -Force
          $env:CI = 'true'
          $maesterModule = Get-Module -ListAvailable -Name Maester | Sort-Object Version -Descending | Select-Object -First 1
          $moduleRoot = Split-Path -Parent $maesterModule.Path
          $testsRoot = Join-Path $moduleRoot 'maester-tests'
          if (-not (Test-Path -LiteralPath $testsRoot)) {
            'y' | Install-MaesterTests
          }

      - name: Run SecureIT assessment engine
        id: maester
        continue-on-error: true
        shell: pwsh
        env:
          PSModulePath: ${{ env.PSMODULEPATH_ROOT }}
        run: |
          ./scripts/Invoke-MaesterRun.ps1 -TenantKey "$env:TENANT_KEY" -TenantName "$env:TENANT_NAME" -TenantId "$env:AZURE_TENANT_ID_TARGET" -TenantDomain "$env:AZURE_TENANT_DOMAIN_TARGET" -ClientId "$env:AZURE_CLIENT_ID_TARGET" -AuthMode "$env:MAESTER_AUTH_MODE" -ClientSecret "$env:CLIENT_SECRET" -WebsiteBaseUrl "$env:REPORT_BASE_URL" -ConfigPath "$env:CONFIG_PATH" -TestProfile "$env:TEST_PROFILE"

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secureit-production-${{ matrix.tenantKey }}-${{ github.run_number }}
          path: output/${{ matrix.tenantKey }}/

      - name: Publish report bundle to SecureIT portal
        if: always()
        shell: bash
        env:
          SECUREIT_BASE_URL: ${{ vars.SECUREIT_BASE_URL_DEV || vars.SECUREIT_BASE_URL_LIVE || 'https://secureit.ict365.ky' }}
          SECUREIT_WORKFLOW_SYNC_TOKEN: ${{ secrets.SECUREIT_WORKFLOW_SYNC_TOKEN }}
          TENANT_KEY: ${{ matrix.tenantKey }}
          EMAIL_TO: ${{ matrix.emailTo }}
        run: |
          set -euo pipefail

          baseUrl="${SECUREIT_BASE_URL%/}"
          if [ -z "$baseUrl" ]; then
            echo "SECUREIT_BASE_URL is not configured." >&2
            exit 1
          fi
          if [ -z "${SECUREIT_WORKFLOW_SYNC_TOKEN:-}" ]; then
            echo "SECUREIT_WORKFLOW_SYNC_TOKEN is not configured." >&2
            exit 1
          fi
          if [ ! -d "output/${TENANT_KEY}" ]; then
            echo "No output bundle found for ${TENANT_KEY}; skipping portal publish." >&2
            exit 0
          fi

          reportRecipientHeader=()
          if [ -n "${EMAIL_TO:-}" ]; then
            reportRecipientHeader=(-H "X-SecureIT-Report-Recipient: ${EMAIL_TO}")
          fi

          tarPath="$RUNNER_TEMP/secureit-report-${TENANT_KEY}.tar.gz"
          rm -f "$tarPath"
          if [ -d "output/${TENANT_KEY}/history" ]; then
            tar -C "output/${TENANT_KEY}" -czf "$tarPath" latest history
          else
            tar -C "output/${TENANT_KEY}" -czf "$tarPath" latest
          fi

          responseFile="$RUNNER_TEMP/secureit-report-import-response-${TENANT_KEY}.json"
          httpStatus="$(curl --silent --show-error -o "$responseFile" -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${SECUREIT_WORKFLOW_SYNC_TOKEN}" \
            -H "X-SecureIT-Workflow-Token: ${SECUREIT_WORKFLOW_SYNC_TOKEN}" \
            -H "X-SecureIT-Tenant-Key: ${TENANT_KEY}" \
            "${reportRecipientHeader[@]}" \
            -H "Content-Type: application/gzip" \
            --data-binary @"${tarPath}" \
            "${baseUrl}/report-import.php?tenant_key=${TENANT_KEY}")"

          echo "Portal import response:"
          cat "$responseFile"
          python3 - "$responseFile" <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text())
          notification = payload.get("notification") if isinstance(payload, dict) else {}
          if not isinstance(notification, dict):
              notification = {}

          print("")
          print("## Report notification")
          print(f"- Status: {notification.get('status', '[not set]')}")
          print(f"- Recipient: {notification.get('recipientMailbox', '[not set]')}")
          print(f"- Mail tenant ID source: {notification.get('mailTenantIdSource', '[not set]')}")
          print(f"- Message: {notification.get('message', '[not set]')}")
          print(f"- Graph request ID: {notification.get('graphRequestId', '[not set]')}")
          print(f"- Graph client request ID: {notification.get('graphClientRequestId', '[not set]')}")
          PY
          rm -f "$responseFile"
          if [ "$httpStatus" -ge 400 ]; then
            echo "Portal import failed with HTTP ${httpStatus}." >&2
            exit 1
          fi
          {
            echo ""
            echo "## Portal import"
            echo "- Tenant key: ${TENANT_KEY}"
            echo "- Status: published to SecureIT portal"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow if the assessment step truly failed without fallback outputs
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.maester.outcome }}" != "success" ] && [ ! -f "output/${{ matrix.tenantKey }}/latest/summary.json" ]; then
            echo "Assessment step failed and no fallback summary was produced." >&2
            exit 1
          fi
