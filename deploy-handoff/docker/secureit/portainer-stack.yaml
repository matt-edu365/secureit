services:
  secureit:
    image: ${SECUREIT_IMAGE:-ghcr.io/matt-edu365/secureit:latest}
    container_name: secureit
    restart: unless-stopped
    pull_policy: ${SECUREIT_PULL_POLICY:-always}
    ports:
      - "8089:80"
    environment:
      SECUREIT_APP_NAME: SecureIT
      SECUREIT_BASE_URL: https://secureit.ict365.ky
      SECUREIT_TENANTS_FILE: /var/www/data/tenants.json
      SECUREIT_REPORTS_ROOT: /var/www/data/reports
      SECUREIT_CANONICAL_CONTROLS_FILE: ${SECUREIT_CANONICAL_CONTROLS_FILE:-/var/www/data/canonical-controls.json}
      SECUREIT_ENTRA_AUTHORITY: ${SECUREIT_ENTRA_AUTHORITY:-organizations}
      SECUREIT_ENTRA_TENANT_ID: ${SECUREIT_ENTRA_TENANT_ID:-}
      SECUREIT_ENTRA_CLIENT_ID: ${SECUREIT_ENTRA_CLIENT_ID:-}
      SECUREIT_ENTRA_CLIENT_SECRET: ${SECUREIT_ENTRA_CLIENT_SECRET:-}
      SECUREIT_ENTRA_REDIRECT_URI: ${SECUREIT_ENTRA_REDIRECT_URI:-https://secureit.ict365.ky/auth/callback}
      SECUREIT_ENTRA_POST_LOGOUT_REDIRECT_URI: ${SECUREIT_ENTRA_POST_LOGOUT_REDIRECT_URI:-https://secureit.ict365.ky/login.php}
      SECUREIT_ENTRA_ALLOWED_TENANT_IDS: ${SECUREIT_ENTRA_ALLOWED_TENANT_IDS:-}
      SECUREIT_ENTRA_ADMIN_EMAIL_DOMAINS: ${SECUREIT_ENTRA_ADMIN_EMAIL_DOMAINS:-ict365.ky}
      SECUREIT_KEY_VAULT_TENANT_ID: ${SECUREIT_KEY_VAULT_TENANT_ID:-}
      SECUREIT_KEY_VAULT_CLIENT_ID: ${SECUREIT_KEY_VAULT_CLIENT_ID:-}
      SECUREIT_KEY_VAULT_CLIENT_SECRET: ${SECUREIT_KEY_VAULT_CLIENT_SECRET:-}
      SECUREIT_KEY_VAULT_NAME: ${SECUREIT_KEY_VAULT_NAME:-}
      SECUREIT_KEY_VAULT_URI: ${SECUREIT_KEY_VAULT_URI:-}
    volumes:
      - secureit_data:/var/www/data
    healthcheck:
      test: ["CMD", "php", "-r", "exit((int) @file_get_contents('http://127.0.0.1/') === false);"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  secureit_data:
    name: secureit_data
