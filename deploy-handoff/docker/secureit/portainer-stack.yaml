services:
  secureit:
    image: ${SECUREIT_IMAGE:-ghcr.io/matt-edu365/secureit:latest}
    container_name: secureit
    restart: unless-stopped
    pull_policy: ${SECUREIT_PULL_POLICY:-always}
    ports:
      - "8089:80"
    environment:
      SECUREIT_APP_NAME: SecureIT
      SECUREIT_BASE_URL: https://secureit.ict365.ky
      SECUREIT_TENANTS_FILE: /var/www/data/tenants.json
      SECUREIT_REPORTS_ROOT: /var/www/data/reports
    volumes:
      - secureit_data:/var/www/data
    healthcheck:
      test: ["CMD", "php", "-r", "exit((int) @file_get_contents('http://127.0.0.1/') === false);"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  secureit_data:
    name: secureit_data
