<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="417" viewBox="0 0 800 417" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Drop shadow filter for ICT text -->
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.12"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background (transparent) -->
  <rect width="800" height="417" fill="none"/>
  
  <!-- ICT Text -->
  <!-- Positioned to match official logo layout -->
  <!-- Font size scaled proportionally from 48px base to match 800px width -->
  <text 
    x="50" 
    y="250" 
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
    font-size="180" 
    font-weight="700" 
    fill="#00635F" 
    filter="url(#dropShadow)"
    letter-spacing="-0.02em"
  >
    ICT
  </text>
  
  <!-- 365 Block -->
  <!-- Positioned to align with ICT text -->
  <!-- Dimensions scaled to match official logo proportions -->
  <g transform="translate(380, 80)">
    <!-- Two-toned rounded rectangle container -->
    <!-- Height: ~220px to match ICT text height proportionally -->
    <rect x="0" y="0" width="360" height="220" rx="12" ry="12" fill="none"/>
    
    <!-- Top half - darker teal (caymanBlue #00635F) -->
    <rect x="0" y="0" width="360" height="110" fill="#00635F" rx="12" ry="0"/>
    
    <!-- Bottom half - lighter teal (caymanGreen #339997) -->
    <rect x="0" y="110" width="360" height="110" fill="#339997" rx="0" ry="12"/>
    
    <!-- Thin white line through center (scaled to 2px for this size) -->
    <rect x="0" y="110" width="360" height="2" fill="#FFFFFF"/>
    
    <!-- 365 Text -->
    <!-- Font size matches ICT (180px), positioned in bottom rectangle -->
    <!-- Centered vertically in bottom half (y=165 is center of bottom rectangle) -->
    <text 
      x="180" 
      y="275" 
      font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
      font-size="180" 
      font-weight="700" 
      fill="#FFFFFF" 
      text-anchor="middle"
      dominant-baseline="central"
      letter-spacing="-0.02em"
    >
      365
    </text>
  </g>
</svg>
